<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split News</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; font-family: system-ui, sans-serif; height: 100vh; overflow: hidden; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    height: 100vh;
    gap: 2px;
    background: #333;
  }

  .panel {
    position: relative;
    background: #000;
  }

  .panel iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .panel .toolbar {
    position: absolute;
    top: 44px;
    left: 8px;
    display: flex;
    gap: 6px;
    align-items: center;
    padding: 6px 10px;
    background: rgba(0,0,0,0.7);
    border-radius: 6px;
    z-index: 10;
    display: none;
  }

  .panel .toolbar.open { display: flex; }

  .menu-btn {
    position: absolute;
    top: 8px;
    left: 8px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    z-index: 11;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.7;
    transition: background 0.2s, opacity 0.2s;
  }

  .menu-btn:hover {
    background: rgba(0,0,0,0.85);
    opacity: 1;
  }

  .toolbar select {
    background: #222;
    color: #fff;
    border: 1px solid #555;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
  }

  .toolbar button {
    background: #222;
    color: #fff;
    border: 1px solid #555;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
  }

  .toolbar button:hover, .toolbar select:hover {
    background: #444;
  }

  .panel.fullscreen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 100;
  }

  .mute-btn {
    position: absolute;
    top: 8px;
    left: 48px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.7;
    transition: background 0.2s, opacity 0.2s;
  }

  .mute-btn:hover {
    background: rgba(0,0,0,0.85);
    opacity: 1;
  }
</style>
</head>
<body>

<div class="grid" id="grid">
  <div class="panel" id="panel-0"></div>
  <div class="panel" id="panel-1"></div>
  <div class="panel" id="panel-2"></div>
  <div class="panel" id="panel-3"></div>
</div>

<script>
const channels = [
  { name: "Fox",    videoId: "ZvdiJUYGBis" },
  { name: "Arirang",     videoId: "live_stream", channelId: "UC-PHIZjV-oX8H7zD1cCN2NQ" },
  { name: "MBC News",    videoId: "q9bM12ucTIY" },
  { name: "Bloomberg",   videoId: "live_stream", channelId: "UCIALMKvObZNtJ6AmdCLP7Lg" },
];

const defaults = [0, 1, 2, 3];
const panelIndices = [0, 1, 2, 3];
const players = {};   // panelIdx -> YT.Player
const muted = {};     // panelIdx -> boolean

function buildMenuBtn(panelIdx) {
  const btn = document.createElement("button");
  btn.className = "menu-btn";
  btn.textContent = "\u2630";
  btn.title = "Menu";
  btn.addEventListener("click", () => {
    const toolbar = document.getElementById("toolbar-" + panelIdx);
    toolbar.classList.toggle("open");
  });
  return btn;
}

function buildToolbar(panelIdx) {
  const toolbar = document.createElement("div");
  toolbar.className = "toolbar";
  toolbar.id = "toolbar-" + panelIdx;

  const select = document.createElement("select");
  channels.forEach((ch, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = ch.name;
    select.appendChild(opt);
  });
  select.value = defaults[panelIdx];
  select.addEventListener("change", () => loadChannel(panelIdx, +select.value));

  const fsBtn = document.createElement("button");
  fsBtn.textContent = "Fullscreen";
  fsBtn.addEventListener("click", () => toggleFullscreen(panelIdx));

  toolbar.appendChild(select);
  toolbar.appendChild(fsBtn);
  return toolbar;
}

function buildMuteBtn(panelIdx) {
  const btn = document.createElement("button");
  btn.className = "mute-btn";
  btn.id = "mute-btn-" + panelIdx;
  btn.textContent = "\u{1F507}";
  btn.title = "Unmute";
  muted[panelIdx] = true;

  btn.addEventListener("click", () => {
    const player = players[panelIdx];
    if (!player || typeof player.isMuted !== "function") return;
    if (player.isMuted()) {
      player.unMute();
      muted[panelIdx] = false;
      btn.textContent = "\u{1F50A}";
      btn.title = "Mute";
    } else {
      player.mute();
      muted[panelIdx] = true;
      btn.textContent = "\u{1F507}";
      btn.title = "Unmute";
    }
  });
  return btn;
}

function getPlayerVars(ch) {
  const vars = { autoplay: 1, mute: 1, cc_load_policy: 1 };
  if (ch.channelId) vars.channel = ch.channelId;
  return vars;
}

function loadChannel(panelIdx, channelIdx) {
  const ch = channels[channelIdx];
  const containerId = "player-" + panelIdx;

  // Destroy existing player
  if (players[panelIdx]) {
    players[panelIdx].destroy();
    delete players[panelIdx];
  }

  // Ensure container div exists
  const panel = document.getElementById("panel-" + panelIdx);
  let container = document.getElementById(containerId);
  if (!container) {
    container = document.createElement("div");
    container.id = containerId;
    container.style.width = "100%";
    container.style.height = "100%";
    panel.appendChild(container);
  }

  players[panelIdx] = new YT.Player(containerId, {
    width: "100%",
    height: "100%",
    videoId: ch.videoId,
    playerVars: getPlayerVars(ch),
    events: {
      onReady: function(event) {
        // Reset mute button state to match player
        muted[panelIdx] = true;
        const btn = document.getElementById("mute-btn-" + panelIdx);
        if (btn) { btn.textContent = "\u{1F507}"; btn.title = "Unmute"; }
      }
    }
  });
}

function toggleFullscreen(panelIdx) {
  const panel = document.getElementById("panel-" + panelIdx);
  if (!document.fullscreenElement) {
    panel.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// YouTube IFrame API calls this when ready
function onYouTubeIframeAPIReady() {
  panelIndices.forEach(i => {
    const panel = document.getElementById("panel-" + i);
    panel.appendChild(buildMenuBtn(i));
    panel.appendChild(buildToolbar(i));
    panel.appendChild(buildMuteBtn(i));
    loadChannel(i, defaults[i]);
  });
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape" && document.fullscreenElement) {
    document.exitFullscreen();
  }
});
</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
